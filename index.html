<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Size Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Statistical Helper Functions ---
        
        // Quantile function for normal distribution (qnorm)
        function qnorm(p) {
            if (p <= 0 || p >= 1) return 0;
            const a = [-3.969683028665376e+01,  2.209460984245205e+02, -2.759285104469687e+02,  1.383577518672690e+02, -3.066479806614716e+01,  2.506628200000000e+00];
            const b = [-5.447609879822406e+01,  1.615858368580409e+02, -1.556989798598866e+02,  6.680131188771972e+01, -1.328068155288572e+01];
            const c = [-7.784894002430293e-03, -3.223964580411365e-01, -2.400758277161838e+00, -2.549732739351735e+00,  4.374664141464968e+00,  2.938163982698783e+00];
            const d = [ 7.784695709041462e-03,  3.224671290700398e-01,  2.445134137142996e+00,  3.754408661907416e+00];
            const low = 0.02425;
            const high = 1 - low;
            if (p < low) {
                const q = Math.sqrt(-2 * Math.log(p));
                return (((((c[0] * q + c[1]) * q + c[2]) * q + c[3]) * q + c[4]) * q + c[5]) /
                       ((((d[0] * q + d[1]) * q + d[2]) * q + d[3]) * q + 1) * -1;
            } else if (p > high) {
                const q = Math.sqrt(-2 * Math.log(1 - p));
                return (((((c[0] * q + c[1]) * q + c[2]) * q + c[3]) * q + c[4]) * q + c[5]) /
                       ((((d[0] * q + d[1]) * q + d[2]) * q + d[3]) * q + 1);
            } else {
                const q = p - 0.5;
                const r = q * q;
                return (((((a[0] * r + a[1]) * r + a[2]) * r + a[3]) * r + a[4]) * r + a[5]) * q /
                       (((((b[0] * r + b[1]) * r + b[2]) * r + b[3]) * r + b[4]) * r + 1);
            }
        }

        function wilson_bounds(n, p, a) {
            p = Math.max(0.0001, Math.min(0.9999, p));
            const z = qnorm(1 - a);
            const z2 = z * z;
            const common = z * Math.sqrt(z2 + 4 * n * p * (1 - p));
            const lb = (2 * n * p + z2 - common) / (2 * (n + z2));
            const ub = (2 * n * p + z2 + common) / (2 * (n + z2));
            return { lb, ub };
        }

        function wilson_lb(n, p, a) { return wilson_bounds(n, p, a).lb; }
        function wilson_precision(n, p, a) {
            const { lb, ub } = wilson_bounds(n, p, a);
            return Math.max(p - lb, ub - p);
        }

        function logGamma(n) {
            const c = [76.18009172947146, -86.50532032941677, 24.01409824083091, -1.231739572450155, 0.1208650973866179e-2, -0.5395239384953e-5];
            let x = n, y = n, tmp = x + 5.5;
            tmp -= (x + 0.5) * Math.log(tmp);
            let ser = 1.000000000190015;
            for (let i = 0; i < 6; i++) ser += c[i] / ++y;
            return -tmp + Math.log(2.5066282746310005 * ser / x);
        }

        function logBinomial(n, k) {
            if (k < 0 || k > n) return -Infinity;
            if (k === 0 || k === n) return 0;
            return logGamma(n + 1) - logGamma(k + 1) - logGamma(n - k + 1);
        }

        function binomialCDF(k, n, p) {
            if (k < 0) return 0;
            if (k >= n) return 1;
            if (p <= 0) return 1;
            if (p >= 1) return 0;

            let useComplement = false;
            let kk = k;
            let pp = p;
            if (k > Math.floor(n / 2)) {
                useComplement = true;
                kk = n - k - 1;
                pp = 1 - p;
            }

            const qq = 1 - pp;
            let term = Math.pow(qq, n); // P(X = 0)
            let sum = term;
            for (let i = 0; i < kk; i++) {
                term *= ((n - i) / (i + 1)) * (pp / qq);
                sum += term;
            }

            const cdf = useComplement ? 1 - sum : sum;
            return Math.min(1, Math.max(0, cdf));
        }

        function findMinN({ predicate, maxN = 100000 }) {
            if (predicate(1)) return 1;
            let lo = 1;
            let hi = 2;
            while (hi < maxN && !predicate(hi)) {
                lo = hi;
                hi *= 2;
            }
            hi = Math.min(hi, maxN);
            if (!predicate(hi)) return maxN;

            while (lo + 1 < hi) {
                const mid = Math.floor((lo + hi) / 2);
                if (predicate(mid)) hi = mid;
                else lo = mid;
            }
            return hi;
        }

        function clopper_pearson_bounds(n, p, a) {
            const x = Math.round(n * p);
            let lb = 0, ub = 1;
            if (x > 0) {
                let low = 0, high = p;
                for (let i = 0; i < 20; i++) {
                    let mid = (low + high) / 2;
                    if (1 - binomialCDF(x - 1, n, mid) > a) low = mid;
                    else high = mid;
                }
                lb = low;
            }
            if (x < n) {
                let low = p, high = 1;
                for (let i = 0; i < 20; i++) {
                    let mid = (low + high) / 2;
                    if (binomialCDF(x, n, mid) > a) low = mid;
                    else high = mid;
                }
                ub = low;
            }
            return { lb, ub };
        }

        function clopper_pearson_precision(n, p, a) {
            const { lb, ub } = clopper_pearson_bounds(n, p, a);
            return Math.max(p - lb, ub - p);
        }

        const App = () => {
            const [mode, setMode] = useState('power');
            const [params, setParams] = useState({
                p0: 0.85, p1: 0.92, alpha1: 0.05, sides1: 1, power: 0.80,
                p_exp: 0.90, d: 0.05, alpha2: 0.05, sides2: 2, method2: 'wilson',
                n_cases_step2: 100, prevalence: 0.10, expected_spec: 0.95, spec_lower_bound: 0.90, alpha3: 0.05, sides3: 1
            });

            const handleChange = (e) => {
                const { name, value, type } = e.target;
                setParams(p => ({ ...p, [name]: type === 'number' ? parseFloat(value) : value }));
            };

            const results = useMemo(() => {
                const getAlphaTail = (alpha, sides) => alpha / sides;
                if (mode === 'power') {
                    const { p0, p1, alpha1, sides1, power } = params;
                    const a_tail = getAlphaTail(alpha1, sides1);
                    const z_alpha = qnorm(1 - a_tail);
                    const z_power = qnorm(power);
                    const n = Math.ceil(Math.pow((z_alpha * Math.sqrt(p0 * (1 - p0)) + z_power * Math.sqrt(p1 * (1 - p1))) / (p1 - p0), 2));
                    return { n };
                } else if (mode === 'precision') {
                    const { p_exp, d, alpha2, sides2, method2 } = params;
                    const a_tail = getAlphaTail(alpha2, sides2);
                    const z = qnorm(1 - a_tail);
                    const n_wald = Math.ceil((z * z * p_exp * (1 - p_exp)) / (d * d));
                    const n_wilson = findMinN({
                        predicate: (n) => wilson_precision(n, p_exp, a_tail) <= d,
                        maxN: 100000
                    });
                    const n_cp = findMinN({
                        predicate: (n) => clopper_pearson_precision(n, p_exp, a_tail) <= d,
                        maxN: 100000
                    });
                    return { n_wald, n_wilson, n_cp, final_n: method2 === 'wald' ? n_wald : method2 === 'wilson' ? n_wilson : n_cp };
                } else {
                    const { n_cases_step2, prevalence, expected_spec, spec_lower_bound, alpha3, sides3 } = params;
                    const a_tail = getAlphaTail(alpha3, sides3);
                    const n_total_for_cases = Math.ceil(n_cases_step2 / prevalence);
                    const n_healthy_needed = findMinN({
                        predicate: (n) => wilson_lb(n, expected_spec, a_tail) >= spec_lower_bound,
                        maxN: 100000
                    });
                    const n_total_for_spec = Math.ceil(n_healthy_needed / (1 - prevalence));
                    return { n_total: Math.max(n_total_for_cases, n_total_for_spec), n_healthy_needed, n_diseased_needed: n_cases_step2, n_total_for_cases, n_total_for_spec };
                }
            }, [params, mode]);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [mode]);

            return (
                <div className="max-w-6xl mx-auto px-4 py-8">
                    <header className="mb-8 text-center">
                        <h1 className="text-3xl font-bold text-slate-900 mb-2">Interactive Stats Calculator</h1>
                        <p className="text-slate-600">Sample size and participant requirements for diagnostic studies</p>
                    </header>

                    <div className="flex justify-center mb-10">
                        <div className="bg-slate-200 p-1 rounded-xl flex flex-wrap gap-1">
                            {['power', 'precision', 'realworld'].map((m, idx) => (
                                <button key={m} type="button" onClick={() => setMode(m)} className={`px-4 py-2 rounded-lg font-medium transition-all ${mode === m ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-600 hover:text-slate-900'}`}>
                                    {idx + 1}. {m === 'power' ? 'Binomial Power' : m === 'precision' ? 'Sensitivity Precision' : 'Real-world Settings'}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-slate-200 h-fit">
                            <h2 className="text-xl font-semibold mb-6 flex items-center gap-2">
                                <i data-lucide="settings-2" className="w-5 h-5 text-blue-600"></i> Parameters
                            </h2>
                            <div className="space-y-4">
                                {mode === 'power' && (
                                    <>
                                        <div><label className="block text-sm font-medium text-slate-700 mb-1">Sensitivity LB (p0)</label><input type="number" step="0.01" name="p0" value={params.p0} onChange={handleChange} className="w-full px-3 py-2 border rounded-lg" /></div>
                                        <div><label className="block text-sm font-medium text-slate-700 mb-1">Expected Sens (p1)</label><input type="number" step="0.01" name="p1" value={params.p1} onChange={handleChange} className="w-full px-3 py-2 border rounded-lg" /></div>
                                        <div><label className="block text-sm font-medium text-slate-700 mb-1">Alpha</label><input type="number" step="0.001" name="alpha1" value={params.alpha1} onChange={handleChange} className="w-full px-3 py-2 border rounded-lg" /></div>
                                        <div><label className="block text-sm font-medium text-slate-700 mb-1">Sides</label><select name="sides1" value={params.sides1} onChange={handleChange} className="w-full px-3 py-2 border rounded-lg bg-white"><option value={1}>1-sided</option><option value={2}>2-sided</option></select></div>
                                        <div><label className="block text-sm font-medium text-slate-700 mb-1">Power</label><input type="number" step="0.01" name="power" value={params.power} onChange={handleChange} className="w-full px-3 py-2 border rounded-lg" /></div>
                                    </>
                                )}
                                {mode === 'precision' && (
                                    <>
                                        <div><label className="block text-sm font-medium text-slate-700 mb-1">Expected Sens</label><input type="number" step="0.01" name="p_exp" value={params.p_exp} onChange={handleChange} className="w-full px-3 py-2 border rounded-lg" /></div>
                                        <div><label className="block text-sm font-medium text-slate-700 mb-1">Margin of Error (d)</label><input type="number" step="0.001" name="d" value={params.d} onChange={handleChange} className="w-full px-3 py-2 border rounded-lg" /></div>
                                        <div><label className="block text-sm font-medium text-slate-700 mb-1">Alpha</label><input type="number" step="0.001" name="alpha2" value={params.alpha2} onChange={handleChange} className="w-full px-3 py-2 border rounded-lg" /></div>
                                        <div><label className="block text-sm font-medium text-slate-700 mb-1">Sides</label><select name="sides2" value={params.sides2} onChange={handleChange} className="w-full px-3 py-2 border rounded-lg bg-white"><option value={1}>1-sided</option><option value={2}>2-sided</option></select></div>
                                        <div><label className="block text-sm font-medium text-slate-700 mb-1">Method</label><select name="method2" value={params.method2} onChange={handleChange} className="w-full px-3 py-2 border rounded-lg bg-white"><option value="wald">Wald</option><option value="wilson">Wilson</option><option value="clopper-pearson">Clopper-Pearson</option></select></div>
                                    </>
                                )}
                                {mode === 'realworld' && (
                                    <>
                                        <div><label className="block text-sm font-medium text-slate-700 mb-1">Diseased Cases (Step 2)</label><input type="number" name="n_cases_step2" value={params.n_cases_step2} onChange={handleChange} className="w-full px-3 py-2 border rounded-lg" /></div>
                                        <div><label className="block text-sm font-medium text-slate-700 mb-1">Prevalence</label><input type="number" step="0.001" name="prevalence" value={params.prevalence} onChange={handleChange} className="w-full px-3 py-2 border rounded-lg" /></div>
                                        <div><label className="block text-sm font-medium text-slate-700 mb-1">Expected Spec</label><input type="number" step="0.01" name="expected_spec" value={params.expected_spec} onChange={handleChange} className="w-full px-3 py-2 border rounded-lg" /></div>
                                        <div><label className="block text-sm font-medium text-slate-700 mb-1">Spec LB</label><input type="number" step="0.01" name="spec_lower_bound" value={params.spec_lower_bound} onChange={handleChange} className="w-full px-3 py-2 border rounded-lg" /></div>
                                        <div><label className="block text-sm font-medium text-slate-700 mb-1">Alpha</label><input type="number" step="0.001" name="alpha3" value={params.alpha3} onChange={handleChange} className="w-full px-3 py-2 border rounded-lg" /></div>
                                        <div><label className="block text-sm font-medium text-slate-700 mb-1">Sides</label><select name="sides3" value={params.sides3} onChange={handleChange} className="w-full px-3 py-2 border rounded-lg bg-white"><option value={1}>1-sided</option><option value={2}>2-sided</option></select></div>
                                    </>
                                )}
                            </div>
                        </div>

                        <div className="lg:col-span-2 space-y-6">
                            {mode === 'power' && (
                                <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 text-center">
                                    <h3 className="text-slate-500 font-medium mb-2 uppercase text-sm">Required Sample Size (n)</h3>
                                    <div className="text-7xl font-bold text-blue-600 mb-4 tabular-nums">{results.n.toLocaleString()}</div>
                                    <p className="text-slate-600">To achieve {(params.power * 100).toFixed(0)}% power at α = {params.alpha1}.</p>
                                </div>
                            )}
                            {mode === 'precision' && (
                                <>
                                    <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 text-center">
                                        <h3 className="text-slate-500 font-medium mb-2 uppercase text-sm">Required Cases (n)</h3>
                                        <div className="text-7xl font-bold text-emerald-600 mb-4 tabular-nums">{results.final_n.toLocaleString()}</div>
                                        <p className="text-slate-600 uppercase font-bold">{params.method2} Method</p>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <div className="bg-slate-50 p-4 rounded-xl text-center border">
                                            <div className="text-xs text-slate-500 uppercase">Wald</div>
                                            <div className="text-xl font-bold">{results.n_wald.toLocaleString()}</div>
                                        </div>
                                        <div className="bg-slate-50 p-4 rounded-xl text-center border">
                                            <div className="text-xs text-slate-500 uppercase">Wilson</div>
                                            <div className="text-xl font-bold">{results.n_wilson.toLocaleString()}</div>
                                        </div>
                                        <div className="bg-slate-50 p-4 rounded-xl text-center border">
                                            <div className="text-xs text-slate-500 uppercase">Clopper-Pearson</div>
                                            <div className="text-xl font-bold">{results.n_cp.toLocaleString()}</div>
                                        </div>
                                    </div>
                                </>
                            )}
                            {mode === 'realworld' && (
                                <>
                                    <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 text-center">
                                        <h3 className="text-slate-500 font-medium mb-2 uppercase text-sm">Total Participants (N)</h3>
                                        <div className="text-7xl font-bold text-indigo-600 mb-4 tabular-nums">{results.n_total.toLocaleString()}</div>
                                        <p className="text-slate-600">Screening population for both arms.</p>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="bg-slate-50 p-6 rounded-2xl border">
                                            <div className="font-semibold mb-4 flex items-center gap-2 text-red-600"><i data-lucide="activity" className="w-4 h-4"></i> Diseased</div>
                                            <div className="flex justify-between text-sm"><span>Cases Needed:</span><span className="font-bold">{results.n_diseased_needed.toLocaleString()}</span></div>
                                            <div className="flex justify-between text-sm"><span>Total Screens:</span><span className="font-bold">{results.n_total_for_cases.toLocaleString()}</span></div>
                                        </div>
                                        <div className="bg-slate-50 p-6 rounded-2xl border">
                                            <div className="font-semibold mb-4 flex items-center gap-2 text-emerald-600"><i data-lucide="shield-check" className="w-4 h-4"></i> Healthy</div>
                                            <div className="flex justify-between text-sm"><span>Controls Needed:</span><span className="font-bold">{results.n_healthy_needed.toLocaleString()}</span></div>
                                            <div className="flex justify-between text-sm"><span>Total Screens:</span><span className="font-bold">{results.n_total_for_spec.toLocaleString()}</span></div>
                                        </div>
                                    </div>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 500);
    </script>
</body>
</html>
